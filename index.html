<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#d0ffd0">
<title>Snake Classic</title>
<link rel="icon" type="image/png" href="preview.png.jpg">
<style>
  :root {
    --bg: #000;
    --fg: #103010;
    --grid: #d0ffd0; /* Campo verde chiaro chiaro */
    --grid-line: #b0e8b0; /* Linee della griglia interne */
    --snake: #008800; /* Serpente verde scuro per contrasto */
    --snake-head: #004400; /* Testa del serpente */
    --food: #ff1010; /* Cibo rosso acceso */
    --accent: #39ff14;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin:0; padding:0; height:100%; background:var(--bg); color:#e8ffe8;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden; touch-action: none;
  }
  #wrap {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; 
    padding: 30px 12px 12px 12px; /* Aumentato il padding superiore per non tagliare le scritte */
  }
  #hud {
    width: 100%; max-width: 560px; display: flex; justify-content: space-between;
    align-items: center; font-size: 14px; letter-spacing: 1px; opacity: 0.9;
    margin-top: 10px; /* Spinge l'HUD più in basso */
  }
  #mode {
    width: 100%; max-width: 560px; display: flex; justify-content: center;
    font-size: 11px; letter-spacing: 1px; opacity: 0.7; margin-top: 4px;
  }
  #mode .mpill {
    background: #0e1a0e; border: 1px solid #1f3a1f; padding: 3px 8px; border-radius: 999px; color: var(--accent);
  }
  #hud .pill {
    background: #0e1a0e; border: 1px solid #1f3a1f; padding: 4px 10px; border-radius: 999px;
  }
  #board {
    background: var(--grid);
    border: 2px solid #1f3a1f;
    border-radius: 6px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    image-rendering: pixelated;
    display: block;
    touch-action: none;
  }
  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }
  #overlay .card {
    background: rgba(0,0,0,0.88);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 18px 22px;
    text-align: center;
    pointer-events: auto;
    box-shadow: 0 0 24px rgba(57,255,20,0.25);
    max-width: 88%;
  }
  #overlay h1 { margin:0 0 6px; font-size: 22px; color: var(--accent); letter-spacing: 2px; }
  #overlay p  { margin: 6px 0; font-size: 13px; opacity: 0.85; color: #fff; }
  #overlay button {
    margin-top: 10px;
    background: var(--accent); color: #001a00; border: none;
    padding: 10px 18px; font-weight: 700; border-radius: 6px;
    font-family: inherit; letter-spacing: 1px; cursor: pointer;
  }
  #overlay button:active { transform: translateY(1px); }
  .hidden { display: none !important; }
  #pad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
    margin-top: 6px;
  }
  #pad button {
    background: #0e1a0e; color: var(--accent); border: 1px solid #1f3a1f;
    border-radius: 8px; font-size: 22px; font-family: inherit;
  }
  #pad button:active { background: #163016; }
  #pad .up    { grid-column: 2; grid-row: 1; }
  #pad .left  { grid-column: 1; grid-row: 2; }
  #pad .pause { grid-column: 2; grid-row: 2; font-size: 14px; }
  #pad .right { grid-column: 3; grid-row: 2; }
  #pad .down  { grid-column: 2; grid-row: 3; }
  @media (pointer: fine) {
    #pad { display: none; }
  }
  @media (max-height: 400px) {
    #wrap { padding-top: 15px; gap: 4px; }
    #hud { font-size: 11px; margin-top: 0; }
    #pad { grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); gap: 4px; }
    #pad button { font-size: 16px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="pill">SCORE <b id="score">0</b></span>
    <span class="pill">BEST <b id="best">0</b></span>
    <span class="pill">SPD <b id="spd">1</b></span>
  </div>
  <div id="mode">
    <span class="mpill" id="modePill">MODE: PINCH (Neural-Band)</span>
  </div>
  <canvas id="board" width="400" height="400"></canvas>
  <div id="pad" aria-hidden="false">
    <button class="up"    data-dir="up">&#9650;</button>
    <button class="left"  data-dir="left">&#9664;</button>
    <button class="pause" data-act="pause">II</button>
    <button class="right" data-dir="right">&#9654;</button>
    <button class="down"  data-dir="down">&#9660;</button>
  </div>
</div>

<div id="overlay">
  <div class="card" id="card">
    <h1>SNAKE</h1>
    <p><b>1 Click / Pinch</b> = Gira a DESTRA (90&deg;)</p>
    <p><b>Click Lungo</b> = Gira a SINISTRA (90&deg;)</p>
    <p><b>Doppio Click / Pinch</b> = PAUSA / RIPRENDI</p>
    <button id="startBtn">START</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const spdEl   = document.getElementById('spd');
  const overlay = document.getElementById('overlay');
  const card    = document.getElementById('card');
  const startBtn= document.getElementById('startBtn');

  const COLS = 20, ROWS = 20;
  let CELL = 20;

  function resize() {
    const padReserved = (matchMedia('(pointer: fine)').matches ? 80 : 260);
    const maxW = Math.min(window.innerWidth - 24, 560);
    const maxH = window.innerHeight - padReserved;
    const size = Math.max(160, Math.min(maxW, maxH));
    CELL = Math.floor(size / COLS);
    const px = CELL * COLS;
    canvas.width = px; canvas.height = px;
    canvas.style.width = px + 'px';
    canvas.style.height = px + 'px';
    draw();
  }
  window.addEventListener('resize', resize);

  let snake, dir, nextDir, food, score, best, tickMs, timer, running, paused, speedLevel;

  function reset() {
    snake = [{x:9,y:10},{x:8,y:10},{x:7,y:10}];
    dir = {x:1,y:0};
    nextDir = dir;
    score = 0;
    speedLevel = 1;
    tickMs = 130;
    placeFood();
    updateHud();
  }

  function placeFood() {
    while (true) {
      const f = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
      if (!snake.some(s => s.x===f.x && s.y===f.y)) { food = f; return; }
    }
  }

  function updateHud() {
    scoreEl.textContent = score;
    bestEl.textContent  = best;
    spdEl.textContent   = speedLevel;
  }

  function loadBest() {
    try { best = parseInt(localStorage.getItem('snake_best')||'0',10) || 0; }
    catch(e) { best = 0; }
  }
  function saveBest() {
    try { localStorage.setItem('snake_best', String(best)); } catch(e) {}
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return gameOver();
    if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      score++;
      if (score > best) { best = score; saveBest(); }
      if (score % 5 === 0 && tickMs > 55) { tickMs -= 10; speedLevel++; restartTimer(); }
      placeFood();
    } else {
      snake.pop();
    }
    updateHud();
    draw();
  }

  function draw() {
    // Sfondo Verde Chiaro Chiaro
    ctx.fillStyle = '#d0ffd0';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // Linee griglia soft
    ctx.strokeStyle = '#b0e8b0';
    ctx.lineWidth = 1;
    for (let i=1;i<COLS;i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL+0.5, 0); ctx.lineTo(i*CELL+0.5, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*CELL+0.5); ctx.lineTo(canvas.width, i*CELL+0.5); ctx.stroke();
    }
    // Food Rosso
    ctx.fillStyle = '#ff1010';
    drawCell(food.x, food.y, 0.75);
    // Snake Verde Scuro per leggibilità su fondo chiaro
    snake.forEach((s,i) => {
      ctx.fillStyle = i===0 ? '#004400' : '#008800';
      drawCell(s.x, s.y, i===0 ? 0.95 : 0.85);
    });
  }
  
  function drawCell(cx, cy, scale) {
    const pad = (1-scale)*CELL/2;
    ctx.fillRect(cx*CELL+pad, cy*CELL+pad, CELL-pad*2, CELL-pad*2);
  }

  function restartTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => { if (!paused) step(); }, tickMs);
  }

  function start() {
    overlay.classList.add('hidden');
    reset();
    running = true; paused = false;
    restartTimer();
    draw();
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      showCard('PAUSATO', 'Fai doppio click per riprendere', 'RIPRENDI');
    } else {
      overlay.classList.add('hidden');
    }
  }

  function gameOver() {
    running = false;
    clearInterval(timer); timer = null;
    showCard('GAME OVER', `Punteggio: ${score} — Migliore: ${best}`, 'REPLAY');
  }

  function showCard(title, msg, btn) {
    card.querySelector('h1').textContent = title;
    const ps = card.querySelectorAll('p');
    ps[0].textContent = msg;
    if(ps[1]) ps[1].textContent = '';
    startBtn.textContent = btn;
    overlay.classList.remove('hidden');
  }

  function turnRight() {
    const m = { x: -dir.y, y: dir.x };
    if (m.x === -dir.x && m.y === -dir.y) return;
    nextDir = m;
  }
  
  function turnLeft() {
    const m = { x: dir.y, y: -dir.x };
    if (m.x === -dir.x && m.y === -dir.y) return;
    nextDir = m;
  }
  
  function setDirAbs(name) {
    const m = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} }[name];
    if (!m) return;
    if (m.x === -dir.x && m.y === -dir.y) return;
    nextDir = m;
  }

  // ------ INPUT UNIFICATO (Ottimizzato per Neural-Band) ------
  let lastClickTime = 0;
  let touchStartTs = 0;
  let longPinchTimeout = null;
  let isLongPinch = false;
  const DOUBLE_DELAY = 280; 
  const LONG_DELAY = 350;

  function handleActionStart() {
    touchStartTs = Date.now();
    isLongPinch = false;
    
    clearTimeout(longPinchTimeout);
    if (running && !paused) {
      longPinchTimeout = setTimeout(() => {
        isLongPinch = true;
        turnLeft(); // Turn left on long hold
      }, LONG_DELAY);
    }
  }

  function handleActionEnd(e) {
    clearTimeout(longPinchTimeout);
    
    if (isLongPinch) return; // Già gestito come click lungo
    
    const now = Date.now();
    const clickInterval = now - lastClickTime;
    
    if (clickInterval < DOUBLE_DELAY) {
      // DOPPIO CLICK RILEVATO -> Gestisce la Pausa
      lastClickTime = 0; 
      if (!running) {
        start();
      } else {
        togglePause();
      }
      if(e) e.preventDefault();
      return;
    }
    
    lastClickTime = now;

    // Aspetta per verificare se si tratta di un singolo o doppio click
    setTimeout(() => {
      if (lastClickTime !== now) return; // È diventato un doppio click, esci
      lastClickTime = 0;
      
      if (!running) return;
      if (paused) {
        togglePause(); // Se è in pausa, un click singolo riprende
      } else {
        turnRight(); // Altrimenti gira a destra
      }
    }, DOUBLE_DELAY);
  }

  // Intercettazione nativa sul canvas sia per tocchi che per click simulati dal bracciale
  canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); handleActionStart(); }, { passive:false });
  canvas.addEventListener('pointerup',   (e) => { e.preventDefault(); handleActionEnd(e); }, { passive:false });

  // Fallback globale sul documento per click sintetici inviati dal Webview della banda
  document.addEventListener('click', (e) => {
    if (e.target.closest('#pad') || e.target.closest('#card') || e.target === startBtn) return;
    handleActionStart();
    setTimeout(() => handleActionEnd(e), 20);
  });

  // Tastiera PC desktop
  window.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    if (e.code === 'Space') {
      e.preventDefault();
      if (!running) { start(); return; }
      // Simula doppio spazio veloce per la pausa da tastiera, oppure usa direttamente 'P'
      togglePause(); 
      return;
    }
    if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); return; }
    if (e.key === 'Enter' && !running) { start(); return; }
    
    const ABS = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
    const d = ABS[e.key]; if (d) { setDirAbs(d); e.preventDefault(); }
  });

  // Pad virtuale
  document.getElementById('pad').addEventListener('click', (e) => {
    const t = e.target.closest('button'); if (!t) return;
    if (t.dataset.dir) setDirAbs(t.dataset.dir);
    else if (t.dataset.act === 'pause') togglePause();
  });

  startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (running && paused) { togglePause(); }
    else { start(); }
  });

  // Inizializzazione
  loadBest();
  resize();
  reset();
  draw();
  showCard('SNAKE', 'Fai doppio click/pinch per iniziare o mettere in pausa.', 'START');
})();
</script>
</body>
</html>
