<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Snake 2D</title>
    <style>
        body { margin: 0; background: #050505; color: #00e5ff; font-family: monospace; overflow: hidden; touch-action: none; }
        #score-board { position: absolute; top: 10px; left: 10px; font-size: 20px; z-index: 10; }
        canvas { display: block; border: 2px solid #00e5ff; }
    </style>
</head>
<body>
    <div id="score-board">Punti: <span id="score">0</span> | Mele: <span id="apples">1</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gridSize = 20;
    
    let snake = [{x: 10, y: 10}];
    let food = [{x: 5, y: 5}];
    let dx = 1, dy = 0, score = 0, appleCount = 1;
    let nextDirection = {dx: 1, dy: 0}; // Buffer per input immediato

    function resize() {
        canvas.width = Math.floor(window.innerWidth / gridSize) * gridSize;
        canvas.height = Math.floor(window.innerHeight / gridSize) * gridSize;
    }
    window.addEventListener('resize', resize);
    resize();

    function update() {
        // Applica direzione bufferizzata
        dx = nextDirection.dx;
        dy = nextDirection.dy;

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        
        // Check collisioni
        if (head.x < 0 || head.x >= canvas.width/gridSize || head.y < 0 || head.y >= canvas.height/gridSize) return gameOver();

        snake.unshift(head);
        
        let ate = false;
        food.forEach((f, i) => {
            if (head.x === f.x && head.y === f.y) {
                score += 10;
                ate = true;
                food.splice(i, 1);
                if (score > 0 && score % 150 === 0) appleCount++;
                spawnFood();
            }
        });

        if (!ate) snake.pop();

        draw();
        setTimeout(update, 100); // Velocità aumentata per reattività
    }

    function spawnFood() {
        while(food.length < appleCount) {
            food.push({
                x: Math.floor(Math.random() * (canvas.width/gridSize)),
                y: Math.floor(Math.random() * (canvas.height/gridSize))
            });
        }
    }

    function draw() {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ff0055";
        food.forEach(f => ctx.fillRect(f.x * gridSize, f.y * gridSize, gridSize-2, gridSize-2));
        
        ctx.fillStyle = "#00e5ff";
        snake.forEach(s => ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize-2, gridSize-2));
        
        document.getElementById("score").innerText = score;
        document.getElementById("apples").innerText = appleCount;
    }

    function gameOver() { alert("Game Over! Punti: " + score); location.reload(); }

    // Input ottimizzato per Neural Band (Swipe)
    let tsX, tsY;
    window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
    window.addEventListener('touchend', e => {
        let dxS = e.changedTouches[0].clientX - tsX;
        let dyS = e.changedTouches[0].clientY - tsY;
        if (Math.abs(dxS) > Math.abs(dyS)) {
            if (dxS > 0 && dx !== -1) nextDirection = {dx: 1, dy: 0};
            else if (dxS < 0 && dx !== 1) nextDirection = {dx: -1, dy: 0};
        } else {
            if (dyS > 0 && dy !== -1) nextDirection = {dx: 0, dy: 1};
            else if (dyS < 0 && dy !== 1) nextDirection = {dx: 0, dy: -1};
        }
    });

    update();
</script>
</body>
</html>
