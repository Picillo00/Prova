<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Isometric Snake</title>
    <style>
        body { margin: 0; background: #050505; color: #00e5ff; font-family: 'Orbitron', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Punti: <span id="score">0</span><br>Mele: <span id="apples">1</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const applesEl = document.getElementById("apples");

    const TILE = 30; // Dimensione base
    let snake = [{x: 10, y: 10}];
    let food = [{x: 5, y: 5}];
    let dx = 1, dy = 0, score = 0, appleCount = 1;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Trasforma coordinate grid in isometriche
    function toIso(x, y) {
        return {
            px: (x - y) * (TILE / 2) + canvas.width / 2,
            py: (x + y) * (TILE / 4) + canvas.height / 3
        };
    }

    function drawBlock(x, y, color, height = 10) {
        const {px, py} = toIso(x, y);
        ctx.fillStyle = color;
        // Effetto volume
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + TILE/2, py + TILE/4);
        ctx.lineTo(px, py + TILE/2);
        ctx.lineTo(px - TILE/2, py + TILE/4);
        ctx.closePath();
        ctx.fill();
    }

    function gameLoop() {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Movimento
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        let ate = false;
        food.forEach((f, i) => {
            if (head.x === f.x && head.y === f.y) {
                score += 10;
                ate = true;
                food.splice(i, 1);
                // Logica aumento mele: ogni 150 punti
                if (score % 150 === 0) appleCount++;
                generateFood();
            }
        });

        if (!ate) snake.pop();

        // Disegno
        food.forEach(f => drawBlock(f.x, f.y, "#ff0055"));
        snake.forEach((s, i) => drawBlock(s.x, s.y, i === 0 ? "#00e5ff" : "#0097a7"));

        scoreEl.innerText = score;
        applesEl.innerText = appleCount;
        setTimeout(gameLoop, 150);
    }

    function generateFood() {
        while(food.length < appleCount) {
            food.push({
                x: Math.floor(Math.random() * 15),
                y: Math.floor(Math.random() * 15)
            });
        }
    }

    window.addEventListener("keydown", e => {
        if(e.key === "ArrowUp") { dx=0; dy=-1; }
        if(e.key === "ArrowDown") { dx=0; dy=1; }
        if(e.key === "ArrowLeft") { dx=-1; dy=0; }
        if(e.key === "ArrowRight") { dx=1; dy=0; }
    });

    generateFood();
    gameLoop();
</script>
</body>
</html>
